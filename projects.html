<script>
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let allProjects=[],activeFilter='all';

async function init(){
  try{
    const[pr,po]=await Promise.all([fetch('projects.json'),fetch('posts.json').catch(()=>({json:()=>[]}))]);
    allProjects=await pr.json();
    const posts=await po.json().catch(()=>[]);
    const sp=document.getElementById('stat-posts');
    const sj=document.getElementById('stat-proj');
    if(sp)sp.textContent=posts.length;
    if(sj)sj.textContent=allProjects.length;
    const ls=document.getElementById('proj-ls');
    if(ls)ls.innerHTML=allProjects.map(p=>esc(p.id)+'/').join('<br>');
    buildFilters();renderGrid();
  }catch(e){
    const g=document.getElementById('forum-grid');
    if(g)g.innerHTML='<p style="color:var(--text-lo);font-size:.74rem;grid-column:1/-1;">Could not load — serve over HTTP: <span style="color:var(--accent)">python3 -m http.server 8080</span></p>';
  }
}

function buildFilters(){
  const statuses=['all',...new Set(allProjects.map(p=>p.status).filter(Boolean))];
  document.getElementById('filter-tabs').innerHTML=statuses.map(s=>`<button id="ftab-${esc(s)}" onclick="setFilter('${esc(s)}')" style="background:none;border:1px solid var(--border2);color:var(--text-lo);padding:.24rem .65rem;border-radius:3px;font-size:.62rem;font-family:var(--font);letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .13s;">${esc(s)}</button>`).join('');
  setFilter('all');
}

function setFilter(status){
  activeFilter=status;
  document.querySelectorAll('#filter-tabs button').forEach(b=>{b.style.color='var(--text-lo)';b.style.borderColor='var(--border2)';b.style.background='none';});
  const ab=document.getElementById('ftab-'+status);
  if(ab){ab.style.color='var(--accent)';ab.style.borderColor='var(--a-border)';ab.style.background='var(--a-bg)';}
  renderGrid();
}

function renderGrid(){
  const list=activeFilter==='all'?allProjects:allProjects.filter(p=>p.status===activeFilter);
  const grid=document.getElementById('forum-grid');
  if(!grid)return;
  if(!list.length){grid.innerHTML='<p style="color:var(--text-lo);font-size:.74rem;grid-column:1/-1;padding:1rem 0;">No projects found.</p>';return;}
  grid.innerHTML=list.map(p=>{
    const banner=p.image?`<img src="${esc(p.image)}" alt="${esc(p.name)}" loading="lazy">`:'<div class="fc-banner-ph">&#9881;</div>';
    const badge=p.status?`<span class="fc-status ${esc(p.status)}"><span class="fc-status-dot"></span>${p.status==='wip'?'WIP':'Done'}</span>`:'';
    const stack=(p.stack||[]).map(t=>`<span class="fc-tag">${esc(t)}</span>`).join('');
    const links=[p.github&&`<a href="${esc(p.github)}" class="fc-link" target="_blank" rel="noopener">→ github</a>`,p.demo&&`<a href="${esc(p.demo)}" class="fc-link" target="_blank" rel="noopener">→ demo</a>`,p.writeup&&`<a href="post.html?file=${encodeURIComponent(p.writeup)}" class="fc-link">→ writeup</a>`].filter(Boolean).join('');
    const href=p.post?`post.html?file=${encodeURIComponent(p.post)}`:(p.github||'#');
    return`<a href="${esc(href)}" class="forum-card"><div class="fc-banner">${banner}</div><div class="fc-body"><div class="fc-top"><div class="fc-title">${esc(p.name)}</div>${badge}</div><div class="fc-desc">${esc(p.description)}</div><div class="fc-stack">${stack}</div><div class="fc-footer"><span>${esc(p.date||'')}</span><div class="fc-links">${links}</div></div></div></a>`;
  }).join('');
}

document.readyState==='loading'?document.addEventListener('DOMContentLoaded',init):init();
</script>
