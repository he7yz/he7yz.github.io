name: Automate Discord embed

on:
  push:
    branches: [main]
    paths:
      - 'posts.json'
      - 'scripts/generate-share-pages.js'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate /w/ pages from posts.json
        run: node js/automate-discord-embed.js

      - name: Commit generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add w/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(posts): regenerate embed links"
            git push
          fi
